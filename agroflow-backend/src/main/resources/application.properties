spring.application.name=agroflow-backend

spring.datasource.url=jdbc:postgresql://localhost:${AGROFLOW_DB_PORT}/${AGROFLOW_DB_NAME}
spring.datasource.username=${AGROFLOW_DB_USER}
spring.datasource.password=${AGROFLOW_DB_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver


spring.datasource.hikari.minimum-idle=5

spring.datasource.hikari.maximum-pool-size=20

spring.datasource.hikari.idle-timeout=30000

spring.datasource.hikari.max-lifetime=2000000

spring.datasource.hikari.connection-timeout=30000

spring.flyway.enabled=true
spring.flyway.url=jdbc:postgresql://localhost:${AGROFLOW_DB_PORT}/${AGROFLOW_DB_NAME}
spring.flyway.user=${AGROFLOW_DB_USER}
spring.flyway.password=${AGROFLOW_DB_PASSWORD}

spring.flyway.baseline-on-migrate=true

spring.flyway.baseline-version=0

spring.jpa.hibernate.ddl-auto=validate

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

logging.level.org.springframework.web=INFO

logging.level.org.hibernate.SQL=DEBUG

logging.level.org.flywaydb=INFO

application.security.jwt.secret-key-${JWT-SECRET-KEY}

application.security.jwt.expiration=86400000

